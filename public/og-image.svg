<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="65%">
      <stop offset="0%" stop-color="#0f2040"/>
      <stop offset="100%" stop-color="#030712"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid dots -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="#1e3a5f" opacity="0.6"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Location pin (centered, upper half) -->
  <g transform="translate(600, 215)">
    <!-- Pin body -->
    <path d="M0,-90 C-50,-90 -90,-50 -90,0 C-90,50 0,130 0,130 C0,130 90,50 90,0 C90,-50 50,-90 0,-90 Z"
          fill="#3b82f6"/>
    <!-- Inner white circle -->
    <circle cx="0" cy="0" r="36" fill="white"/>
    <!-- Blue dot inside -->
    <circle cx="0" cy="0" r="16" fill="#3b82f6"/>
    <!-- Glow ring -->
    <circle cx="0" cy="0" r="90" fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.25"/>
    <circle cx="0" cy="0" r="115" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.12"/>
  </g>

  <!-- GeoAR wordmark -->
  <text x="600" y="440"
        text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="100" font-weight="700" fill="white" letter-spacing="-3">
    GeoAR
  </text>

  <!-- Tagline -->
  <text x="600" y="510"
        text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="30" fill="#6b7280" letter-spacing="0.5">
    Experiencias geolocalizadas de realidad aumentada
  </text>
</svg>
